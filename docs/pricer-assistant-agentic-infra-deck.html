# __Why__ “Agentic” AI ?

- **LLM's Single Shot Limitations**: 
  - Limited context window
  - No memory of previous interactions
  - No ability to reason about complex tasks
- **Agent**: Multi-step coordination logic that allows the execution of complex tasks (steps, branching, state)
- **Capabilities**: 
  - Prompt engineering
  - Tool calling
  - Memory management

<!-- NOTE: When we did our original PoC many of this elements were missing, specially guardrails, security and observability. -->

---
<!-- .slide: class="slide-dense" -->
# __What__ can we do with “Agentic” AI ?

- Automate complex workflows
- Improve decision-making processes
  - Use LLM as context provider for complex datasets
  - Provide explanations and briefs on pricing strategies
  - Generate pricing recommendations
- Enhance user experience
  - Provide personalized recommendations
  - Allow user to customize its experience with natural language
- Reduce manual effort
  - Complete multi-step tasks with single prompts

<!-- NOTE: When we did our original PoC many of this elements were missing, specially guardrails, security and observability. -->

<!-- .slide: class="slide-dense" -->
# __How__ we can provide "Agentic AI" capabilities : “Agentic Architecture”

- **Agent Workflow**: Multi-step coordinator logic that allows the execution of complex tasks (steps, branching, state)
- **Agent**: Step in the workflow that invokes a model to perform a simple task (prompt, input, output, model, tools, memory)
- **Models**: Business grade adapter to access external LLMs
- **Tools**: Controlled capabilities that will allow agents to perform tasks (internal or external)
- **Memory**: Persistent storage for agent state and context

    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

      const deck = new Reveal({
        hash: true,
        controls: true,
        progress: true,
        slideNumber: "c/t",
        transition: "slide",
        transitionSpeed: "fast",
        backgroundTransition: "fade",
        width: 1280,
        height: 720,
        margin: 0.06,
        minScale: 0.2,
        maxScale: 1.15,
        center: false,
        plugins: [RevealMarkdown, RevealNotes, RevealHighlight],
        markdown: {
          smartypants: true,
        },
      });

      const baseDeckConfig = {
        margin: deck.getConfig().margin,
        maxScale: deck.getConfig().maxScale,
      };

      function applyPerSlideDeckConfig(slideEl) {
        if (!slideEl) {
          return;
        }

        const marginAttr = slideEl.getAttribute("data-deck-margin");
        const maxScaleAttr = slideEl.getAttribute("data-deck-max-scale");

        const nextMargin =
          marginAttr && !Number.isNaN(parseFloat(marginAttr))
            ? parseFloat(marginAttr)
            : baseDeckConfig.margin;

        const nextMaxScale =
          maxScaleAttr && !Number.isNaN(parseFloat(maxScaleAttr))
            ? parseFloat(maxScaleAttr)
            : baseDeckConfig.maxScale;

        deck.configure({
          margin: nextMargin,
          maxScale: nextMaxScale,
        });

        deck.layout();
      }

      function toMermaidId(index) {
        return `mmd-${index}-${Math.random().toString(16).slice(2)}`;
      }

      function renderMermaidInSlides() {
        const slidesRoot = document.querySelector(".reveal .slides");
        if (!slidesRoot) {
          return;
        }

        // Convert ```mermaid code blocks to <div class="mermaid">...</div>
        const mermaidBlocks = slidesRoot.querySelectorAll(
          "pre code.language-mermaid, pre code.mermaid",
        );

        mermaidBlocks.forEach((codeEl, index) => {
          const pre = codeEl.closest("pre");
          if (!pre) {
            return;
          }

          const parent = pre.parentElement;
          if (!parent) {
            return;
          }

          const diagramText = codeEl.textContent ?? "";
          const container = document.createElement("div");
          container.className = "mermaid";
          container.id = toMermaidId(index);
          container.textContent = diagramText;

          parent.replaceChild(container, pre);
        });

        // Initialize Mermaid after replacements
        mermaid.initialize({
          startOnLoad: false,
          theme: "dark",
          securityLevel: "strict",
        });

        // Render all mermaid diagrams
        const mermaidDivs = slidesRoot.querySelectorAll("div.mermaid");
        mermaidDivs.forEach(async (el) => {
          try {
            const id = el.id || toMermaidId(0);
            const { svg } = await mermaid.render(id, el.textContent ?? "");
            el.innerHTML = svg;
          } catch (err) {
            // If render fails, keep the text so the slide isn't empty.
            // eslint-disable-next-line no-console
            console.warn("Mermaid render failed", err);
          }
        });
      }

      deck.on("ready", () => {
        applyPerSlideDeckConfig(deck.getCurrentSlide());
        renderMermaidInSlides();
      });

      deck.on("slidechanged", (event) => {
        applyPerSlideDeckConfig(event.currentSlide);
      });

      // Re-render on print mode too.
      deck.on("pdf-ready", () => {
        renderMermaidInSlides();
      });

      await deck.initialize();
    </script>
