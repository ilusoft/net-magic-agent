name: Deploy Frontend Artifact

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment to deploy to"
        required: true
        type: string
      artifact_run_id:
        description: "Workflow run ID that produced the frontend-dist artifact"
        required: true
        type: string
      artifact_name:
        description: "Name of the uploaded artifact"
        required: false
        default: "frontend-dist"
        type: string

permissions:
  contents: write
  actions: write

jobs:
  deploy:
    environment:
      name: ${{ inputs.environment || github.event.inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name || github.event.inputs.artifact_name }}
          path: downloaded-artifact
          run-id: ${{ inputs.artifact_run_id || github.event.inputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract dist bundle
        run: |
          rm -rf deploy-dist
          mkdir -p deploy-dist
          unzip downloaded-artifact/frontend-dist.zip -d deploy-dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app_location: "deploy-dist"
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_api_build: true
