name: Deploy Backend to Azure Web App

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment to deploy to"
        required: true
        default: "production"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: "8.0.x"
      API_PROJECT: "backend/src/MagicAgent.Api/MagicAgent.Api.csproj"
      PUBLISH_DIR: "backend/src/MagicAgent.Api/publish"
      PACKAGE_PATH: "backend/src/MagicAgent.Api/app.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        env:
          NG_PRQX_PWD: ${{ secrets.PRQX_PACKAGES_READ_TOKEN }}
          NG_PRQX_USER: ${{ secrets.PRQX_PACKAGES_READ_USER }}             
        run: |
          dotnet restore ${{ env.API_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.API_PROJECT }} --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/tests/MagicAgent.Api.Tests/MagicAgent.Api.Tests.csproj --configuration Release --no-build

      - name: Publish
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PRQX_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PRQX_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PRQX_AZURE_SUBSCRIPTION_ID }}

      - name: Package artifact
        run: |
          rm -f ${{ env.PACKAGE_PATH }}
          cd ${{ env.PUBLISH_DIR }}
          zip -r ../app.zip .

      - name: Deploy with Azure CLI
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src-path ${{ env.PACKAGE_PATH }} \
            --type zip \
            --async false
