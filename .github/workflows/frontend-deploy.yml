name: Deploy Frontend to Azure Static Web App

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment to deploy to"
        required: true
        default: "production"

permissions:
  contents: read

jobs:
  build-and-deploy:
    environment:
      name: ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20.x"
      APP_LOCATION: "frontend"
      OUTPUT_LOCATION: "frontend/dist"
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_MSAL_CLIENT_ID: ${{ vars.VITE_MSAL_CLIENT_ID }}
      VITE_MSAL_TENANT_NAME: ${{ vars.VITE_MSAL_TENANT_NAME }}
      VITE_MSAL_POLICY_ID: ${{ vars.VITE_MSAL_POLICY_ID }}
      VITE_MSAL_REDIRECT_URI: ${{ vars.VITE_MSAL_REDIRECT_URI }}
      VITE_MSAL_CACHE_LOCATION: ${{ vars.VITE_MSAL_CACHE_LOCATION }}
      VITE_MSAL_SCOPES: ${{ vars.VITE_MSAL_SCOPES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app_location: "frontend/dist"
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_api_build: true
